<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" type="image/png" sizes="32x32" href="assets/pipc-icon.png" />
<link rel="apple-touch-icon" sizes="180x180" href="assets/pipc-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="PIPC" />
  <title>Log in – PIPC</title>
  <style>
    body{font-family:Arial,sans-serif;margin:0;background:#f3f5f8;color:#111827}
    .wrap{max-width:560px;margin:40px auto;padding:0 16px}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:16px;box-shadow:0 6px 18px rgba(0,0,0,.08)}
    h1{margin:0 0 10px 0}
    p{color:#6b7280;margin:0 0 14px 0;line-height:1.4}
    label{display:block;font-weight:900;margin:10px 0 6px}
    input{width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:10px;font-size:1rem;box-sizing:border-box}
    button{margin-top:12px;width:100%;background:#1e88e5;color:#fff;border:0;border-radius:10px;padding:10px;font-weight:900;cursor:pointer}
    button.ghost{background:#fff;color:#0f172a;border:1px solid #e5e7eb}
    .row{display:flex;gap:10px;margin-top:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    .row a{color:#1e88e5;font-weight:900;text-decoration:none}
    .msg{margin-top:12px;font-weight:900}
    .ok{color:#166534}
    .bad{color:#b91c1c}
    .smallbtn{background:#fff;border:1px solid #e5e7eb;color:#0f172a;border-radius:10px;padding:8px 10px;font-weight:900;cursor:pointer;width:auto;margin-top:0}
    .hint{font-size:0.86rem;color:#6b7280;margin-top:6px}
    .box{margin-top:14px;padding-top:14px;border-top:1px solid #e5e7eb}
    .reset-panel{display:none;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:12px;margin-top:12px}
    .reset-panel h2{font-size:1rem;margin:0 0 6px 0}
    .smallbtn{background:#fff;border:1px solid #e5e7eb;color:#0f172a;border-radius:10px;padding:8px 10px;font-weight:900;cursor:pointer}
    .hint{font-size:0.86rem;color:#6b7280;margin-top:6px}
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module">
    import { supabase, getAccessState } from "./supabase-client.js";

    const form = document.getElementById("form");
    const msg = document.getElementById("msg");
    const logoutBtn = document.getElementById("logoutBtn");
    const forgotBtn = document.getElementById("forgotBtn");
    const resendVerifyBtn = document.getElementById("resendVerifyBtn");
    const newPasswordForm = document.getElementById("newPasswordForm");
    const resetPanel = document.getElementById("resetPanel");

    const redirectTo = window.location.origin + window.location.pathname;

    function setMessage(text, kind){
      msg.textContent = text;
      msg.className = `msg ${kind}`;
    }

    function hasRecoveryHash() {
      return window.location.hash.includes("type=recovery");
    }

    async function refreshUI(){
      const { isLoggedIn, isSubscriber } = await getAccessState();
      logoutBtn.style.display = isLoggedIn ? "inline-block" : "none";

      if (hasRecoveryHash()) {
        resetPanel.style.display = "block";
        setMessage("Password reset verified. Enter your new password below.", "ok");
        return;
      }

      if (isLoggedIn) {
        setMessage(
          isSubscriber
            ? "You are already logged in with an active subscription."
            : "You are logged in, but this account does not have an active subscription yet.",
          isSubscriber ? "ok" : "bad"
        );
      if (isLoggedIn) {
        msg.textContent = isSubscriber
          ? "You are already logged in with an active subscription."
          : "You are logged in, but this account does not have an active subscription yet.";
        msg.className = `msg ${isSubscriber ? "ok" : "bad"}`;
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = "";
      msg.className = "msg";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        if (error.message.toLowerCase().includes("email not confirmed")) {
          setMessage("Your email is not verified yet. Use 'Resend verification email' below, then confirm from your inbox.", "bad");
        } else {
          setMessage(error.message, "bad");
        }
        return;
      }

      const { isSubscriber } = await getAccessState();
      setMessage(
        isSubscriber
          ? "Logged in successfully. Redirecting to subscriber content…"
          : "Logged in, but subscription not active yet. Please upgrade to unlock all systems.",
        isSubscriber ? "ok" : "bad"
      );
      msg.textContent = isSubscriber
        ? "Logged in successfully. Redirecting to subscriber content…"
        : "Logged in, but subscription not active yet. Please upgrade to unlock all systems.";
      msg.classList.add(isSubscriber ? "ok" : "bad");

      window.location.href = "index.html";
    });

    forgotBtn.addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      if (!email) {
        setMessage("Enter your account email first, then click 'Forgot password'.", "bad");
        return;
      }

      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo
      });

      if (error) {
        setMessage(error.message, "bad");
        return;
      }

      setMessage("Password reset email sent. Open your email and click the reset link.", "ok");
    });

    resendVerifyBtn.addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      if (!email) {
        setMessage("Enter your account email first, then click 'Resend verification email'.", "bad");
        return;
      }

      const { error } = await supabase.auth.resend({
        type: "signup",
        email,
        options: {
          emailRedirectTo: window.location.origin + "/login.html"
        }
      });

      if (error) {
        setMessage(error.message, "bad");
        return;
      }

      setMessage("Verification email sent. Please check your inbox and click 'Verify email'.", "ok");
    });

    newPasswordForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const password = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (password.length < 8) {
        setMessage("New password must be at least 8 characters.", "bad");
        return;
      }

      if (password !== confirmPassword) {
        setMessage("New password and confirmation do not match.", "bad");
        return;
      }

      const { error } = await supabase.auth.updateUser({ password });
      if (error) {
        setMessage(error.message, "bad");
        return;
      }

      setMessage("Password updated successfully. You can now sign in with your new password.", "ok");
      window.history.replaceState({}, document.title, window.location.pathname);
      resetPanel.style.display = "none";
      newPasswordForm.reset();
    });

    logoutBtn.addEventListener("click", async () => {
      await supabase.auth.signOut();
      setMessage("Logged out.", "ok");
      await refreshUI();
    });

    refreshUI();
  </script>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Log in</h1>
      <p>Log in with your account email and password to access subscriber-only clinical systems.</p>

      <form id="form">
        <label>Email</label>
        <input id="email" type="email" required autocomplete="email" />

        <label>Password</label>
        <input id="password" type="password" required autocomplete="current-password" />

        <button type="submit">Log in</button>
        <div class="hint">If your account uses a username, use the email address registered to that account.</div>
      </form>

      <div class="row box">
        <button id="forgotBtn" class="smallbtn" type="button">Forgot password</button>
        <button id="resendVerifyBtn" class="smallbtn" type="button">Resend verification email</button>
      </div>

      <div id="resetPanel" class="reset-panel">
        <h2>Set new password</h2>
        <form id="newPasswordForm">
          <label>New password</label>
          <input id="newPassword" type="password" required minlength="8" autocomplete="new-password" />

          <label>Confirm new password</label>
          <input id="confirmPassword" type="password" required minlength="8" autocomplete="new-password" />

          <button type="submit">Update password</button>
        </form>
      </div>

      <div id="msg" class="msg"></div>

      <div class="row">
        <a href="signup.html">Need an account? Sign up</a>
        <button id="logoutBtn" class="smallbtn" type="button" style="display:none;">Log out</button>
      </div>

      <div class="row" style="justify-content:flex-start;">
        <a href="index.html">Back home</a>
      </div>
    </div>
  </div>
</body>
</html>
